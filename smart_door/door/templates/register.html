{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnel Registry - Smart Door</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #00ff88;
            --primary-hover: #00e67a;
            --bg: #000000;
            --card-bg: rgba(10, 10, 10, 0.82);
            --text: #ffffff;
            --text-muted: #94a3b8;
            --input-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(0, 255, 136, 0.2);
            --error: #f87171;
            --success: #00ff88;
            --glow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 4rem 1rem;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 3rem;
            border-radius: 2rem;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), var(--glow);
            animation: slideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px var(--primary));
        }

        h2 {
            font-size: 2.25rem;
            font-weight: 600;
            margin: 0;
            background: linear-gradient(to right, #ffffff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            position: relative;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-left: 0.25rem;
        }

        .input-container {
            position: relative;
        }

        .input-container i:not(.password-toggle i) {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 20px;
            height: 20px;
            pointer-events: none;
            transition: color 0.3s;
        }

        input,
        textarea {
            width: 100%;
            padding: 1rem 1.25rem 1rem 3.5rem;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        input:focus+i {
            color: var(--primary);
        }

        .password-toggle {
            position: absolute;
            right: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
            z-index: 10;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        .media-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .media-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            border: 2px dashed rgba(0, 255, 136, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .media-container.active {
            border-color: var(--primary);
            background: rgba(0, 255, 136, 0.03);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.05);
        }

        .media-container.ready {
            border-color: var(--success);
            border-style: solid;
            background: rgba(0, 255, 136, 0.05);
        }

        .preview-box {
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .media-btn {
            width: 100%;
            padding: 0.875rem;
            border-radius: 0.75rem;
            background: transparent;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        .media-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            transform: translateY(-2px);
        }

        .media-btn.stop {
            background: var(--error);
            border-color: var(--error);
            color: #000;
        }

        .submit-btn {
            grid-column: span 2;
            padding: 1.25rem;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 1rem;
            font-size: 1.125rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 2rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .submit-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.5);
        }

        .error-msg {
            grid-column: span 2;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 1rem;
            border-radius: 1rem;
            text-align: center;
            margin-top: 1rem;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .footer {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            text-align: center;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        .footer a:hover {
            text-decoration: underline;
            text-shadow: 0 0 8px var(--primary);
        }

        @media (max-width: 768px) {

            .form-grid,
            .media-section {
                grid-template-columns: 1fr;
            }

            .full-width {
                grid-column: auto;
            }

            .submit-btn {
                grid-column: auto;
            }

            .container {
                padding: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">🛡️</div>
            <h2>Personnel Registry</h2>
        </div>

        <form method="POST" enctype="multipart/form-data" id="regForm" class="form-grid">
            {% csrf_token %}

            <div class="form-group">
                <label>Access ID</label>
                <div class="input-container">
                    <i data-lucide="user"></i>
                    <input type="text" name="username" placeholder="Pick a username" required>
                </div>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <div class="input-container">
                    <i data-lucide="at-sign"></i>
                    <input type="text" name="full_name" placeholder="Your full name" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-container">
                    <i data-lucide="mail"></i>
                    <input type="email" name="email" placeholder="example@mail.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <div class="input-container">
                    <i data-lucide="phone"></i>
                    <input type="tel" name="phone_number" placeholder="+1234567890" required>
                </div>
            </div>

            <div class="form-group full-width">
                <label>Deployment Address</label>
                <div class="input-container">
                    <i data-lucide="map-pin" style="top: 1.5rem;"></i>
                    <textarea name="address" rows="1" placeholder="Your residential address" required
                        style="padding-left: 3.5rem;"></textarea>
                </div>
            </div>

            <div class="form-group">
                <label>Primary Passcode</label>
                <div class="input-container">
                    <i data-lucide="lock"></i>
                    <input type="password" name="password" id="password" placeholder="••••••••" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('password', 'eye-pw')">
                        <i data-lucide="eye" id="eye-pw"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label>Verify Passcode</label>
                <div class="input-container">
                    <i data-lucide="lock"></i>
                    <input type="password" name="confirm" id="confirm" placeholder="••••••••" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('confirm', 'eye-conf')">
                        <i data-lucide="eye" id="eye-conf"></i>
                    </button>
                </div>
            </div>

            <div class="media-section full-width">
                <div class="media-container" id="faceContainer">
                    <label>📸 Face Biometrics</label>
                    <div class="preview-box">
                        <video id="webcam" autoplay muted playsinline></video>
                        <img id="facePreview" style="display:none; width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <button type="button" class="media-btn" id="faceBtn" onclick="toggleCamera()">INITIALIZE
                        CAMERA</button>
                    <input type="file" name="profile_image" id="profile_image" hidden>
                </div>

                <div class="media-container" id="voiceContainer">
                    <label>🎤 Voice Print</label>
                    <div class="preview-box" style="flex-direction: column; background: #000;">
                        <span id="voiceStatus" style="font-size: 3.5rem; transition: all 0.3s;">🎤</span>
                        <div id="recordingTimer"
                            style="margin-top: 1rem; font-family: monospace; font-size: 1.25rem; font-weight: 600; color: var(--primary); display: none;">
                            00:00</div>
                    </div>
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 1.5rem; line-height: 1.4;">
                        Hold for 3+
                        seconds (e.g., "Access protocol emerald")</p>
                    <button type="button" class="media-btn" id="voiceBtn" onclick="toggleVoice()">START
                        ENROLLMENT</button>
                    <input type="file" name="voice_recording" id="voice_recording" hidden>
                </div>
            </div>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <button type="submit" class="submit-btn" id="submitBtn">Finalize Enrollment</button>
        </form>

        <div class="footer">
            Existing personnel? <a href="{% url 'login' %}">Log In Here</a>
        </div>
    </div>

    <script src="{% static 'js/wav_encoder.js' %}"></script>
    <script>
        lucide.createIcons();

        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        const webcam = document.getElementById('webcam');
        const facePreview = document.getElementById('facePreview');
        const faceBtn = document.getElementById('faceBtn');
        const faceContainer = document.getElementById('faceContainer');
        const profileInput = document.getElementById('profile_image');

        const voiceBtn = document.getElementById('voiceBtn');
        const voiceStatus = document.getElementById('voiceStatus');
        const voiceContainer = document.getElementById('voiceContainer');
        const voiceInput = document.getElementById('voice_recording');

        let stream;
        let audioContext;
        let processor;
        let input;
        let audioData = [];
        let timerInterval;
        let isCamOpen = false;
        let isRecording = false;

        async function toggleCamera() {
            if (!isCamOpen) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    webcam.srcObject = stream;
                    webcam.style.display = 'block';
                    facePreview.style.display = 'none';
                    faceBtn.innerText = 'CAPTURE BIOMETRICS';
                    isCamOpen = true;
                    faceContainer.classList.add('active');
                } catch (e) {
                    alert("Camera access denied");
                }
            } else {
                capturePhoto();
            }
        }

        function capturePhoto() {
            const canvas = document.createElement('canvas');
            canvas.width = webcam.videoWidth;
            canvas.height = webcam.videoHeight;
            canvas.getContext('2d').drawImage(webcam, 0, 0);

            const dataUrl = canvas.toDataURL('image/jpeg');
            facePreview.src = dataUrl;
            facePreview.style.display = 'block';
            webcam.style.display = 'none';
            faceBtn.innerText = 'RE-INITIALIZE';
            isCamOpen = false;
            faceContainer.classList.add('ready');

            fetch(dataUrl).then(res => res.blob()).then(blob => {
                const file = new File([blob], "profile.jpg", { type: "image/jpeg" });
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                profileInput.files = dataTransfer.files;
            });
        }

        async function toggleVoice() {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 22050 });
                    input = audioContext.createMediaStreamSource(stream);
                    processor = audioContext.createScriptProcessor(4096, 1, 1);

                    audioData = [];
                    processor.onaudioprocess = e => {
                        const channelData = e.inputBuffer.getChannelData(0);
                        audioData.push(new Float32Array(channelData));
                    };

                    input.connect(processor);
                    processor.connect(audioContext.destination);

                    let seconds = 0;
                    const timerDisp = document.getElementById('recordingTimer');
                    timerDisp.innerText = "00:00";
                    timerDisp.style.display = 'block';
                    timerInterval = setInterval(() => {
                        seconds++;
                        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                        const s = (seconds % 60).toString().padStart(2, '0');
                        timerDisp.innerText = `${m}:${s}`;
                    }, 1000);

                    voiceBtn.innerText = 'TERMINATE ENROLLMENT';
                    voiceBtn.classList.add('stop');
                    voiceStatus.innerText = '🎙️';
                    voiceStatus.style.animation = 'pulse-active 1.5s infinite';
                    voiceContainer.classList.add('active');
                    isRecording = true;
                } catch (e) {
                    alert("Microphone access denied: " + e);
                }
            } else {
                processor.disconnect();
                input.disconnect();
                audioContext.close();

                clearInterval(timerInterval);
                document.getElementById('recordingTimer').style.display = 'none';

                let totalLength = audioData.reduce((acc, val) => acc + val.length, 0);
                let result = new Float32Array(totalLength);
                let offset = 0;
                for (let chunk of audioData) {
                    result.set(chunk, offset);
                    offset += chunk.length;
                }

                if (typeof encodeWAV === 'function') {
                    const blob = encodeWAV(result, 22050);
                    const file = new File([blob], "voice.wav", { type: "audio/wav" });
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(file);
                    voiceInput.files = dataTransfer.files;

                    voiceStatus.innerText = '✅';
                    voiceStatus.style.animation = 'none';
                    voiceContainer.classList.remove('active');
                    voiceContainer.classList.add('ready');
                    voiceBtn.innerText = 'RE-ENROLL';
                    voiceBtn.classList.remove('stop');
                } else {
                    alert("WAV Encoder ready but failed to load. Please refresh.");
                }
                isRecording = false;
            }
        }
    </script>
    <style>
        @keyframes pulse-active {
            0% {
                transform: scale(1);
                filter: drop-shadow(0 0 0px var(--primary));
            }

            50% {
                transform: scale(1.15);
                filter: drop-shadow(0 0 20px var(--primary));
            }

            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 0px var(--primary));
            }
        }
    </style>
</body>

</html>
