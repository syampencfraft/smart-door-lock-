{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modify Credentials - Smart Door</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #00ff88;
            --primary-hover: #00e67a;
            --bg: #000000;
            --card-bg: rgba(10, 10, 10, 0.85);
            --text: #ffffff;
            --text-muted: #94a3b8;
            --input-bg: rgba(255, 255, 255, 0.05);
            --error: #f87171;
            --border: rgba(0, 255, 136, 0.1);
            --glow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 4rem 1.5rem;
        }

        .container {
            background-color: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3.5rem;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), var(--glow);
            width: 100%;
            max-width: 550px;
            border: 1px solid var(--border);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        h2 {
            margin: 0 0 3rem;
            font-size: 2rem;
            font-weight: 600;
            text-align: center;
            background: linear-gradient(to right, #ffffff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        label {
            display: block;
            margin-bottom: 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-left: 0.25rem;
        }

        input,
        textarea {
            width: 100%;
            padding: 1.1rem 1.25rem;
            border-radius: 1.25rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background-color: var(--input-bg);
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }

        .media-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin: 2.5rem 0;
        }

        .media-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            border-radius: 1.5rem;
            text-align: center;
            cursor: pointer;
            border: 2px dashed rgba(0, 255, 136, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .media-card:hover {
            border-color: var(--primary);
            background: rgba(0, 255, 136, 0.03);
            transform: translateY(-2px);
        }

        .media-card.captured {
            border-style: solid;
            border-color: var(--primary);
            background: rgba(0, 255, 136, 0.05);
        }

        #voiceCard button {
            margin-top: 0.5rem;
            width: 100%;
            padding: 0.75rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .actions {
            display: flex;
            gap: 1.25rem;
            margin-top: 3rem;
        }

        button.btn {
            flex: 1;
            padding: 1.1rem;
            border-radius: 1.25rem;
            border: none;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            color: var(--text);
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Personnel Modification</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" value="{{ user.full_name|default:'' }}" placeholder="Updated name"
                    required>
            </div>

            <div class="form-group">
                <label>Comms Link (Email)</label>
                <input type="email" name="email" value="{{ user.email }}" required>
            </div>

            <div class="form-group">
                <label>Contact Vector</label>
                <input type="tel" name="phone_number" value="{{ user.phone_number|default:'' }}"
                    placeholder="+x xxx xxx xxxx">
            </div>

            <div class="form-group">
                <label>Station Deployment (Address)</label>
                <textarea name="address" rows="2"
                    placeholder="Sector coordinate details">{{ user.address|default:'' }}</textarea>
            </div>

            <div class="media-section">
                <div class="media-card" id="imgCard" onclick="document.getElementById('imgInput').click()">
                    <i data-lucide="image" style="color: var(--primary);"></i>
                    <span id="imgLabel">Update Identification</span>
                    <input type="file" name="profile_image" id="imgInput" hidden accept="image/*"
                        onchange="updateStatus(this, 'imgCard', 'imgLabel')">
                </div>
                <div class="media-card" id="voiceCard">
                    <i data-lucide="mic" style="color: var(--primary);"></i>
                    <span id="voiceLabel">Acoustic Update</span>
                    <div id="recordingTimer"
                        style="font-family: monospace; font-weight: 600; color: var(--primary); display: none;">00:00
                    </div>
                    <button type="button" id="voiceBtn" class="btn btn-primary" onclick="toggleVoiceRecording()">Start
                        Capture</button>
                    <input type="file" name="voice_recording" id="voice_recording" hidden>
                </div>
            </div>

            <div class="actions">
                <button type="button" class="btn btn-secondary" onclick="window.history.back()">Abort</button>
                <button type="submit" class="btn btn-primary" id="saveBtn">Authorize Changes</button>
            </div>
        </form>
    </div>

    <script src="{% static 'js/wav_encoder.js' %}"></script>
    <script>
        lucide.createIcons();

        let audioContext;
        let processor;
        let input;
        let audioData = [];
        let isRecording = false;
        let timerInterval;
        let seconds = 0;

        function updateStatus(input, cardId, labelId) {
            const card = document.getElementById(cardId);
            const label = document.getElementById(labelId);
            if (input.files && input.files[0]) {
                card.classList.add('captured');
                label.innerText = 'File Ready';
                label.style.color = 'var(--primary)';
            }
        }

        async function toggleVoiceRecording() {
            const voiceBtn = document.getElementById('voiceBtn');
            const voiceLabel = document.getElementById('voiceLabel');
            const voiceCard = document.getElementById('voiceCard');
            const voiceInput = document.getElementById('voice_recording');
            const timerDisp = document.getElementById('recordingTimer');

            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 22050 });
                    input = audioContext.createMediaStreamSource(stream);
                    processor = audioContext.createScriptProcessor(4096, 1, 1);

                    audioData = [];
                    processor.onaudioprocess = e => {
                        const channelData = e.inputBuffer.getChannelData(0);
                        audioData.push(new Float32Array(channelData));
                    };

                    input.connect(processor);
                    processor.connect(audioContext.destination);

                    seconds = 0;
                    timerDisp.innerText = "00:00";
                    timerDisp.style.display = 'block';
                    timerInterval = setInterval(() => {
                        seconds++;
                        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                        const s = (seconds % 60).toString().padStart(2, '0');
                        timerDisp.innerText = `${m}:${s}`;
                    }, 1000);

                    isRecording = true;
                    voiceBtn.innerText = 'Terminate';
                    voiceBtn.style.background = 'var(--error)';
                    voiceLabel.innerText = 'Recording...';
                    voiceLabel.style.color = 'var(--error)';
                    voiceCard.style.borderColor = 'var(--error)';
                } catch (err) {
                    alert("Microphone access denied: " + err);
                }
            } else {
                processor.disconnect();
                input.disconnect();
                audioContext.close();

                clearInterval(timerInterval);
                timerDisp.style.display = 'none';

                let totalLength = audioData.reduce((acc, val) => acc + val.length, 0);
                let result = new Float32Array(totalLength);
                let offset = 0;
                for (let chunk of audioData) {
                    result.set(chunk, offset);
                    offset += chunk.length;
                }

                const blob = encodeWAV(result, 22050);
                const file = new File([blob], "voice.wav", { type: "audio/wav" });
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                voiceInput.files = dataTransfer.files;

                voiceCard.classList.add('captured');
                voiceLabel.innerText = 'Capture Complete';
                voiceLabel.style.color = 'var(--primary)';
                voiceBtn.innerText = 'Recapture';
                voiceBtn.style.background = 'var(--primary)';
                voiceCard.style.borderColor = 'var(--primary)';

                isRecording = false;
            }
        }
    </script>
</body>

</html>
