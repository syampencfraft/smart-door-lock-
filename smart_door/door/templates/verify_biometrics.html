{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biometric Scan Zone - Smart Door</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #00ff88;
            --primary-glow: rgba(0, 255, 136, 0.4);
            --bg: #000000;
            --card-bg: rgba(10, 10, 10, 0.85);
            --text: #ffffff;
            --text-muted: #94a3b8;
            --error: #f87171;
            --border: rgba(0, 255, 136, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .terminal-container {
            width: 95%;
            max-width: 900px;
            aspect-ratio: 16/9;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 2.5rem;
            border: 1px solid var(--border);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(0, 255, 136, 0.05);
            animation: terminalPop 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes terminalPop {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .terminal-header {
            padding: 2rem 3rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-pill {
            padding: 0.5rem 1.25rem;
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0.3;
            }
        }

        .main-stage {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .verification-step {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            box-sizing: border-box;
        }

        .verification-step.active {
            display: flex;
            animation: slideIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        #video-container {
            position: relative;
            width: 500px;
            height: 300px;
            background: #000;
            border-radius: 2rem;
            overflow: hidden;
            border: 2px solid var(--border);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
            margin-bottom: 2.5rem;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .scan-overlay {
            position: absolute;
            inset: 0;
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 2rem;
            pointer-events: none;
            box-shadow: inset 0 0 60px rgba(0, 255, 136, 0.05);
        }

        .scan-corners {
            position: absolute;
            inset: 20px;
            border: 2px solid transparent;
            pointer-events: none;
        }

        .scan-corners::before,
        .scan-corners::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid var(--primary);
        }

        .scanning-line {
            display: none;
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(to bottom, transparent, var(--primary), transparent);
            box-shadow: 0 0 20px var(--primary);
            z-index: 10;
            top: 0;
            animation: scan 4s infinite linear;
        }

        @keyframes scan {
            0% {
                top: 0;
            }

            100% {
                top: 100%;
            }
        }

        .voice-card {
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        .mic-container {
            width: 100px;
            height: 100px;
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2.5rem;
            position: relative;
        }

        .mic-wave {
            position: absolute;
            inset: -10px;
            border: 1px solid var(--primary);
            border-radius: 50%;
            opacity: 0;
        }

        .recording .mic-wave {
            animation: ripple 2s infinite ease-out;
        }

        @keyframes ripple {
            0% {
                transform: scale(0.8);
                opacity: 0.8;
            }

            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        .btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 1.25rem 4rem;
            border-radius: 1.5rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
        }

        .btn:disabled {
            background: #1a1a1a;
            color: #444;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .instruction {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #timer {
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 1rem;
            letter-spacing: 4px;
        }
    </style>
</head>

<body>
    <div class="terminal-container">
        <div class="terminal-header">
            <h3 style="margin:0; font-weight: 600; letter-spacing: 1px; color: var(--text-muted);">BIO-METRIC SECURITY
                TERMINAL</h3>
            <div id="sys-status" class="status-pill">
                <span class="status-dot"></span>
                <span id="status-text">SYSTEM STANDBY</span>
            </div>
        </div>

        <div class="main-stage">
            <!-- Step 1: Face -->
            <div id="step-face" class="verification-step active">
                <div id="video-container">
                    <video id="webcam" autoplay muted playsinline></video>
                    <div class="scan-overlay"></div>
                    <div class="scan-corners"></div>
                    <div class="scanning-line" id="scan-line"></div>
                </div>
                <button class="btn" id="capture-btn" onclick="captureFace()">Initiate Optical Scan</button>
                <div class="instruction" id="face-hint">Align optical core with neural patterns</div>
            </div>

            <!-- Step 2: Voice -->
            <div id="step-voice" class="verification-step">
                <div class="voice-card">
                    <div class="mic-container" id="mic-container">
                        <div class="mic-wave"></div>
                        <i data-lucide="mic" style="width: 40px; height: 40px; color: var(--primary);"></i>
                    </div>
                    <div id="timer">00:00</div>
                    <p
                        style="color:var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2.5rem;">
                        Authorize acoustic signature: "Unlock the gate"
                    </p>
                    <button class="btn" id="voice-btn" onclick="toggleVoiceRecording()">Start Capture</button>
                    <div class="instruction" id="voice-hint">Awaiting acoustic input</div>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'js/wav_encoder.js' %}"></script>
    <script>
        lucide.createIcons();
        const video = document.getElementById('webcam');
        const statusText = document.getElementById('status-text');
        const faceHint = document.getElementById('face-hint');
        const captureBtn = document.getElementById('capture-btn');
        const scanLine = document.getElementById('scan-line');

        const stepFace = document.getElementById('step-face');
        const stepVoice = document.getElementById('step-voice');
        const micContainer = document.getElementById('mic-container');
        const voiceBtn = document.getElementById('voice-btn');
        const voiceHint = document.getElementById('voice-hint');

        let isVerifying = false;
        let authStream;
        let isRecording = false;
        let audioContext;
        let input;
        let processor;
        let audioData = [];
        let timerInterval;
        let seconds = 0;

        async function init() {
            try {
                authStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                video.srcObject = authStream;
                statusText.innerText = "READY FOR AUTH";
            } catch (err) {
                console.error("Camera Error:", err);
                statusText.innerText = "HARDWARE FAILURE";
                statusText.parentElement.style.borderColor = "var(--error)";
                statusText.parentElement.style.color = "var(--error)";
            }
        }

        async function captureFace() {
            if (isVerifying) return;

            isVerifying = true;
            captureBtn.disabled = true;
            captureBtn.innerText = "SCANNING...";
            scanLine.style.display = "block";

            statusText.innerText = "EXTRACTING GEOMETRY";
            faceHint.innerText = "DO NOT MOVE...";

            const offscreenCanvas = document.createElement('canvas');
            offscreenCanvas.width = video.videoWidth;
            offscreenCanvas.height = video.videoHeight;
            const ctx = offscreenCanvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            const imageData = offscreenCanvas.toDataURL('image/jpeg');

            try {
                const res = await fetch("{% url 'verify_biometrics' %}", {
                    method: 'POST',
                    headers: { 'X-CSRFToken': '{{ csrf_token }}', 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ 'type': 'face', 'image': imageData })
                }).then(r => r.json());

                if (res.success) {
                    goToVoice();
                } else {
                    statusText.innerText = "AUTH REJECTED";
                    statusText.parentElement.style.borderColor = "var(--error)";
                    statusText.parentElement.style.color = "var(--error)";
                    faceHint.innerText = "IDENTITY MISMATCH IN DETECTED CORE";

                    setTimeout(() => {
                        isVerifying = false;
                        captureBtn.disabled = false;
                        captureBtn.innerText = "RE-SCAN";
                        scanLine.style.display = "none";
                        statusText.innerText = "READY FOR AUTH";
                        statusText.parentElement.style.borderColor = "var(--primary)";
                        statusText.parentElement.style.color = "var(--primary)";
                        faceHint.innerText = "Align optical core with neural patterns";
                    }, 3000);
                }
            } catch (e) {
                console.error("Verification error:", e);
                isVerifying = false;
                captureBtn.disabled = false;
            }
        }

        function goToVoice() {
            stepFace.classList.remove('active');
            stepVoice.classList.add('active');
            statusText.innerText = "OPTICAL PASSED / ACOUSTIC AWAITED";
        }

        function toggleVoiceRecording() {
            if (!isRecording) {
                startVoiceRecording();
            } else {
                stopVoiceRecording();
            }
        }

        async function startVoiceRecording() {
            isRecording = true;
            audioData = [];

            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 22050 });
            input = audioContext.createMediaStreamSource(authStream);
            processor = audioContext.createScriptProcessor(4096, 1, 1);

            processor.onaudioprocess = e => {
                const channelData = e.inputBuffer.getChannelData(0);
                audioData.push(new Float32Array(channelData));
            };

            input.connect(processor);
            processor.connect(audioContext.destination);

            seconds = 0;
            const timerDisp = document.getElementById('timer');
            timerDisp.innerText = "00:00";
            timerInterval = setInterval(() => {
                seconds++;
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                timerDisp.innerText = `${m}:${s}`;
            }, 1000);

            voiceBtn.innerText = "TERMINATE CAPTURE";
            voiceBtn.style.background = "var(--error)";
            statusText.innerText = "RECORDING SIGNATURE";
            voiceHint.innerText = "WAVEFORM DETECTED...";
            micContainer.classList.add('recording');
        }

        function stopVoiceRecording() {
            isRecording = false;
            micContainer.classList.remove('recording');

            processor.disconnect();
            input.disconnect();
            audioContext.close();

            clearInterval(timerInterval);

            let totalLength = audioData.reduce((acc, val) => acc + val.length, 0);
            let result = new Float32Array(totalLength);
            let offset = 0;
            for (let chunk of audioData) {
                result.set(chunk, offset);
                offset += chunk.length;
            }

            const audioBlob = encodeWAV(result, 22050);
            verifyVoice(audioBlob);

            voiceBtn.disabled = true;
            voiceBtn.innerText = "ANALYZING...";
            voiceBtn.style.background = "#1a1a1a";
        }

        async function verifyVoice(audioBlob) {
            const formData = new FormData();
            formData.append('type', 'voice');
            formData.append('audio', audioBlob, 'voice.wav');

            statusText.innerText = "MATCHING SIGNATURE...";
            try {
                const res = await fetch("{% url 'verify_biometrics' %}", {
                    method: 'POST',
                    headers: { 'X-CSRFToken': '{{ csrf_token }}' },
                    body: formData
                }).then(r => r.json());

                if (res.success) {
                    window.location.href = "{% url 'door_unlocked' %}";
                } else {
                    statusText.innerText = "SIGNATURE REJECTED";
                    statusText.parentElement.style.borderColor = "var(--error)";
                    statusText.parentElement.style.color = "var(--error)";
                    voiceHint.innerText = "ACOUSTIC PATTERN MISMATCH";

                    setTimeout(() => {
                        voiceBtn.disabled = false;
                        voiceBtn.innerText = "START CAPTURE";
                        voiceBtn.style.background = "var(--primary)";
                        statusText.innerText = "OPTICAL PASSED / ACOUSTIC AWAITED";
                        statusText.parentElement.style.borderColor = "var(--primary)";
                        statusText.parentElement.style.color = "var(--primary)";
                        voiceHint.innerText = "Awaiting acoustic input";
                    }, 3000);
                }
            } catch (e) {
                console.error("Voice verification error:", e);
                voiceBtn.disabled = false;
            }
        }

        init();
    </script>
</body>

</html>
